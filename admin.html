<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvoiceApp Admin - Pro Upgrades</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 25px;
        }

        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 14px;
        }

        .admin-section {
            background: #f8f9fa;
            padding: 28px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .admin-section h2 {
            color: #2c3e50;
            font-size: 18px;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 12px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 13px 15px;
            border: 1.5px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.25);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .message {
            padding: 15px 18px;
            border-radius: 8px;
            margin-top: 18px;
            text-align: center;
            display: none;
            font-weight: 600;
            border: 1px solid;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
            display: block;
        }

        .instructions {
            background: white;
            padding: 24px;
            border-radius: 12px;
            margin-top: 25px;
            border-left: 5px solid #667eea;
        }

        .instructions h3 {
            color: #667eea;
            margin-bottom: 16px;
            font-size: 16px;
        }

        .instructions ol {
            margin-left: 25px;
        }

        .instructions li {
            margin: 10px 0;
            color: #495057;
            line-height: 1.8;
            font-size: 14px;
        }

        .highlight-box {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
            color: #856404;
            font-size: 13px;
            line-height: 1.8;
        }

        .success-check {
            font-size: 48px;
            text-align: center;
            margin: 20px 0;
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 InvoiceApp Admin</h1>
            <p>Manage Pro Upgrades</p>
        </div>

        <div class="admin-section">
            <h2>Upgrade User to Pro</h2>
            
            <div class="input-group">
                <label for="userEmail">User Email Address</label>
                <input type="email" id="userEmail" placeholder="user@example.com">
            </div>

            <div class="input-group">
                <label for="adminPassword">Admin Password</label>
                <input type="password" id="adminPassword" placeholder="Enter admin password">
            </div>

            <button class="btn" onclick="upgradeUser()">✨ Upgrade to Pro</button>

            <div id="message" class="message"></div>
            <div class="success-check" id="successCheck">*
